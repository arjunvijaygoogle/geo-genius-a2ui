name: Deploy frontend

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Assumes you have saved your Service Account JSON key as a GitHub Secret.
          # Alternatively, you can configure Workload Identity Federation.
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        # Important: Run the command from the frontend directory
        working-directory: ./frontend
        run: |
          gcloud run deploy a2ui-frontend \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars="VITE_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }},VITE_AGENT_BACKEND_CHAT_API_URL=${{ secrets.AGENT_BACKEND_CHAT_API_URL }}"