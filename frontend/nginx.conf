server {
    # Cloud Run defaults to port 8080
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        
        # This is the magic line that makes React routing work
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like JS and CSS for better performance
    location ~* \.(?:css|js|jpg|svg|png)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public";
    }
}